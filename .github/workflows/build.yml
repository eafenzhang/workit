name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: |
          npx electron-builder --win --publish never
          echo "=== release files ==="
          Get-ChildItem release | Select-Object Name, Length

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Create Release
        if: success()
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Workit v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Installer
        if: success()
        run: |
          $RELEASE_ID = "${{ steps.create_release.outputs.id }}"
          Write-Host "Release ID: $RELEASE_ID"

          # Find .exe files in release root (not in subdirs like win-unpacked)
          $exeFiles = Get-ChildItem "release" -Filter "*.exe" -File -Recurse | Where-Object { $_.FullName -notmatch "win-unpacked" }
          Write-Host "Found: $($exeFiles.Count) installer file(s)"
          foreach ($f in $exeFiles) {
            $name = $f.Name
            $size = $f.Length
            Write-Host "Uploading $name ($size bytes)..."
            $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; Content-Type = "application/octet-stream" }
            $fileBytes = [System.IO.File]::ReadAllBytes($f.FullName)
            $uploadUrl = "https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets?name=$name"
            try {
              Invoke-RestMethod -Uri $uploadUrl -Method POST -Headers $headers -Body $fileBytes
              Write-Host "Uploaded: $name"
            } catch {
              Write-Host "Error uploading $name : $_"
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
