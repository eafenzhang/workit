name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: |
          npx electron-builder --win --publish never
          echo "=== release directory ==="
          ls -la release/ || echo "no release dir"
          echo "=== find all .exe in release ==="
          find release -type f -name "*.exe" 2>/dev/null
          echo "=== NSIS installer check ==="
          find release -name "*Setup*.exe" 2>/dev/null

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Create Release
        if: success()
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Workit v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Installer
        if: success()
        shell: bash
        run: |
          echo "=== release directory contents ==="
          ls -la release/ 2>/dev/null || echo "release dir not found"

          echo "=== Find exe files in release root (not in subdirs) ==="
          EXE_FILES=$(find release -maxdepth 1 -name "*.exe" -type f 2>/dev/null)
          echo "Found exe files: $EXE_FILES"

          RELEASE_ID="${{ steps.create_release.outputs.id }}"
          UPLOAD_URL="https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets"
          echo "Release ID: $RELEASE_ID"
          echo "Upload URL: $UPLOAD_URL"

          if [[ -z "$EXE_FILES" ]]; then
            echo "WARNING: No exe files found in release/ root"
            echo "Checking all release contents..."
            find release -type f -name "*.exe" 2>/dev/null | while read f; do
              echo "Found exe: $f"
            done
          else
            for f in $EXE_FILES; do
              BASENAME=$(basename "$f")
              SIZE=$(wc -c < "$f" 2>/dev/null || echo "0")
              echo "Uploading $BASENAME (${SIZE} bytes)..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$f" \
                "$UPLOAD_URL?name=$BASENAME")
              echo "HTTP response: $HTTP_CODE for $BASENAME"
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
