name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --win --dir --publish never

      - name: Check build output
        if: always()
        run: |
          echo "=== release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Upload to Release
        if: success()
        shell: bash
        run: |
          VERSION=$(grep '"version"' package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "Using version: $VERSION"

          EXE_FILES=$(find release -name "*.exe" -type f 2>/dev/null | tr '\n' ' ')
          echo "Found exe: $EXE_FILES"
          if [ -z "$EXE_FILES" ]; then echo "No exe found"; exit 1; fi

          RESPONSE=$(curl -s -X POST "https://api.github.com/repos/eafenzhang/workit/releases" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v$VERSION\",\"name\":\"Workit v$VERSION\",\"body\":\"自动构建\",\"draft\":false,\"prerelease\":false}")

          RELEASE_ID=$(echo $RESPONSE | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "Release ID: $RELEASE_ID"

          for f in $EXE_FILES; do
            basename_f=$(basename "$f")
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets?name=$basename_f"
            echo "Uploaded: $basename_f"
          done

          echo "Release created: https://github.com/eafenzhang/workit/releases/tag/v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
