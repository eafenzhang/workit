name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Zip unpacked directory
        shell: powershell
        run: |
          if (Test-Path "release/win-unpacked") {
            Compress-Archive -Path "release/win-unpacked/*" -DestinationPath "Workit-win-unpacked.zip" -Force
            Write-Host "Created Workit-win-unpacked.zip"
          } else {
            Write-Host "No win-unpacked directory found, skipping zip"
          }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-build
          path: |
            release/*.exe
            release/*.yml
            Workit-win-unpacked.zip
          retention-days: 7

      - name: Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: Workit v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.yml
            release/*.zip
            Workit-win-unpacked.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
