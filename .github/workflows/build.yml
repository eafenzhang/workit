name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        continue-on-error: true

      - name: Build Electron app
        run: npm run electron:build

      - name: Check build output
        run: |
          echo "=== Checking release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }
          echo "=== Checking dist directory ==="
          if (Test-Path dist) { Get-ChildItem dist | Select-Object Name } else { echo "dist directory not found" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows
          path: release/win-unpacked/
          retention-days: 7
          continue-on-error: true

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workit-installer
          path: release/*.exe
          retention-days: 7
          continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          body: "## Workit 需求管理应用\n\nWindows 桌面应用\n\n下载 win-unpacked 文件夹从 Actions artifacts"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}