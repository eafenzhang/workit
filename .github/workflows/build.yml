name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --win --dir --publish never

      - name: Check build output
        if: always()
        run: |
          echo "=== release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Upload to Release
        if: success()
        run: |
          $VERSION = (Get-Content package.json | Select-String '"version"' | ForEach-Object { [regex]::Match($_, '"version":\s*"([^"]*)"').Groups[1].Value })
          echo "Version: $VERSION"

          $EXE_PATH = "release\win-unpacked\Workit.exe"
          if (-Not (Test-Path $EXE_PATH)) {
            echo "ERROR: Workit.exe not found at $EXE_PATH"
            exit 1
          }
          echo "Found exe: $EXE_PATH"

          echo "Creating GitHub release..."
          $BODY = @{
            tag_name = "v$VERSION"
            name = "Workit v$VERSION"
            body = "自动构建"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Compress

          $RESP = Invoke-RestMethod -Uri "https://api.github.com/repos/eafenzhang/workit/releases" `
            -Method POST `
            -Headers @{ Authorization = "token $env:GITHUB_TOKEN"; Accept = "application/vnd.github.v3+json" } `
            -Body $BODY

          $RELEASE_ID = $RESP.id
          $UPLOAD_URL = $RESP.upload_url -replace '\{\?name,label\}', ''
          echo "Release ID: $RELEASE_ID"

          echo "Uploading Workit.exe..."
          $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; Content-Type = "application/octet-stream" }
          $fileBytes = [System.IO.File]::ReadAllBytes($EXE_PATH)
          Invoke-RestMethod -Uri "$UPLOAD_URL?name=Workit.exe" `
            -Method POST `
            -Headers $headers `
            -Body $fileBytes

          echo "Upload complete"
          echo "Release: https://github.com/eafenzhang/workit/releases/tag/v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
