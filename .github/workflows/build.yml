name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --win --dir --publish never

      - name: Check build output
        if: always()
        run: |
          echo "=== release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: release/win-unpacked/Workit.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
