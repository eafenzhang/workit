name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        continue-on-error: true

      - name: Build Electron app
        run: npm run electron:build

      - name: Check build output
        run: |
          echo "=== Checking release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }
          echo "=== Checking dist directory ==="
          if (Test-Path dist) { Get-ChildItem dist | Select-Object Name } else { echo "dist directory not found" }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: release/win-unpacked/*.exe
          body: |
            ## Workit v1.0.0
            Windows Portable 版本
            - 下载 `Workit.exe` 或 `electron.exe` 运行
          draft: false
          prerelease: false
          replace: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}