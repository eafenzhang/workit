name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          $version = (Get-Date).ToString("yyyyMMdd-HHmmss")
          $content = Get-Content package.json -Raw
          $content = $content -replace '"version": "[^"]*"', "`"version`": `"$version`""
          Set-Content package.json -Value $content
          npm run build

      - name: Build Electron app
        run: npx electron-builder --win --dir --publish never

      - name: Check build output
        run: |
          echo "=== Checking release directory ==="
          if (Test-Path release) { Get-ChildItem release -Recurse | Select-Object FullName, Length } else { echo "release directory not found" }
          echo "=== Checking dist directory ==="
          if (Test-Path dist) { Get-ChildItem dist | Select-Object Name } else { echo "dist directory not found" }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Upload to Release
        if: success()
        shell: bash
        run: |
          VERSION=$(grep '"version"' package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "Using version: $VERSION"

          echo "Finding exe files..."
          EXE_FILES=$(find release -name "*.exe" -type f 2>/dev/null | tr '\n' ' ')
          echo "Found: $EXE_FILES"
          if [ -z "$EXE_FILES" ]; then echo "No exe files found"; exit 1; fi

          echo "Creating release v$VERSION"

          RESPONSE=$(curl -s -X POST "https://api.github.com/repos/eafenzhang/workit/releases" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v$VERSION\",\"name\":\"Workit v$VERSION\",\"body\":\"自动构建\",\"draft\":false,\"prerelease\":false}")

          RELEASE_ID=$(echo $RESPONSE | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "Release ID: $RELEASE_ID"

          for f in $EXE_FILES; do
            echo "Uploading $f..."
            basename_f=$(basename "$f")
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets?name=$basename_f"
            echo "Done: $basename_f"
          done

          echo "Creating version.json..."
          VERSION_JSON="{\"version\":\"$VERSION\",\"date\":\"$(date -Iseconds)\",\"downloadUrl\":\"https://github.com/eafenzhang/workit/releases/download/v$VERSION/Workit.exe\"}"
          echo "$VERSION_JSON" > version.json

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data "@version.json" \
            "https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets?name=version.json"

          echo "Release created: https://github.com/eafenzhang/workit/releases/tag/v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}