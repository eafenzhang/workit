name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: |
          npx electron-builder --win --publish never
          echo "=== release files ==="
          Get-ChildItem release | Select-Object Name, Length

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Create Release
        if: success()
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Workit v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Installer
        if: success()
        shell: bash
        run: |
          RELEASE_ID="${{ steps.create_release.outputs.id }}"
          UPLOAD_URL="https://uploads.github.com/repos/eafenzhang/workit/releases/$RELEASE_ID/assets"
          echo "Upload URL: $UPLOAD_URL"

          # Find .exe files in release root (not in win-unpacked)
          for f in release/*.exe; do
            if [[ "$f" != *"win-unpacked"* ]]; then
              BASENAME=$(basename "$f")
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
              echo "Uploading $BASENAME (${SIZE} bytes)..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$f" \
                "$UPLOAD_URL?name=$BASENAME"
              echo "Uploaded: $BASENAME"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
