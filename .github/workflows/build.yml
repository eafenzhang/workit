name: Build Windows App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: |
          npx electron-builder --win --publish never
          echo "=== release files ==="
          Get-ChildItem release | Select-Object Name, Length

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workit-windows-unpacked
          path: release/win-unpacked/
          retention-days: 7

      - name: Create Release
        if: success()
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Workit v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Installer
        if: success()
        shell: bash
        run: |
          EXE_FILES=$(find release -name "*.exe" -type f 2>/dev/null)
          echo "Found exe files:"
          echo "$EXE_FILES"
          for f in $EXE_FILES; do
            BASENAME=$(basename "$f")
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "https://uploads.github.com/repos/eafenzhang/workit/releases/${{ steps.create_release.outputs.id }}/assets?name=$BASENAME"
            echo "Uploaded: $BASENAME"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
